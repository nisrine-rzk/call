<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CallManager Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

[data-theme="dark"] {
  --bg: #0f1117; --bg2: #1a1d27; --bg3: #22263a; --card: #1e2235;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.16);
  --text: #f0f0f5; --muted: #8b8fa8;
}
[data-theme="light"] {
  --bg: #f4f6fb; --bg2: #ffffff; --bg3: #eef0f7; --card: #ffffff;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
  --text: #1a1d2e; --muted: #6b7280;
}
:root {
  --accent: #4f7fff; --accent2: #7c5cfc;
  --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
  --r: 12px; --rs: 8px;
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; flex-direction: column;
}

/* ── Header ── */
.hdr {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 14px; height: 52px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; }
.logo-ic {
  width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg,var(--accent),var(--accent2));
  display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
}
.logo-txt { display: none; }
@media(min-width:480px){ .logo-txt { display:inline; } }

.hdr-right { display: flex; gap: 6px; align-items: center; }
.stat-pill {
  padding: 4px 9px; border-radius: 20px; background: var(--bg3);
  border: 1px solid var(--border); font-size: 12px; display: flex; align-items: center; gap: 4px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; }
.d-blue{background:var(--accent)} .d-green{background:var(--green)} .d-red{background:var(--red)} .d-amber{background:var(--amber)}

/* Desktop only pills and btns */
.desk-only { display: none; }
@media(min-width:768px){ .desk-only { display: flex; gap:6px; align-items:center; } }

.theme-btn {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border2);
  background: var(--bg3); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}

/* ── Mobile bar ── */
.mob-bar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 8px 12px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px;
}
@media(min-width:768px){ .mob-bar { display:none; } }
.mob-stats { display: flex; align-items: center; gap: 8px; }
.ms { display:flex; flex-direction:column; align-items:center; min-width:50px; }
.ms-n { font-size:18px; font-weight:800; line-height:1; }
.ms-l { font-size:10px; color:var(--muted); margin-top:2px; }
.si { font-size:10px; color:var(--green); margin-left:auto; white-space:nowrap; }
.mob-acts { display:flex; gap:6px; }
.mob-acts .btn { flex:1; font-size:12px; padding:7px 4px; }

/* ── App body ── */
.app-body { display:flex; flex:1; overflow:hidden; min-height:0; }

/* ── Sidebar ── */
.sidebar {
  width:300px; flex-shrink:0; display:flex; flex-direction:column;
  background:var(--bg2); border-right:1px solid var(--border); overflow:hidden;
}
@media(max-width:767px){
  .sidebar { width:100%; border-right:none; }
  .sidebar.gone { display:none; }
  .panel.gone { display:none; }
}
.sb-top {
  padding:10px 12px; border-bottom:1px solid var(--border);
  display:flex; flex-direction:column; gap:7px; flex-shrink:0;
}
.sb-row { display:flex; align-items:center; justify-content:space-between; }
.sb-ttl { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; }
.srch {
  width:100%; padding:8px 11px; background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--rs); color:var(--text); font-size:14px; outline:none; transition:border-color .2s;
}
.srch:focus { border-color:var(--accent); }
.ftabs { display:flex; gap:4px; flex-wrap:wrap; }
.ftab {
  padding:4px 9px; border-radius:6px; font-size:12px; cursor:pointer;
  background:transparent; border:1px solid var(--border); color:var(--muted); transition:all .15s;
}
.ftab.on,.ftab:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
.prog-w { background:var(--bg3); border-radius:10px; height:4px; overflow:hidden; }
.prog-f { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .4s; }
.prog-l { font-size:10px; color:var(--muted); margin-top:3px; }
.clist { overflow-y:auto; flex:1; }
.ci {
  padding:11px 12px; cursor:pointer; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px; transition:background .1s;
}
.ci:hover,.ci:active { background:var(--bg3); }
.ci.on { background:rgba(79,127,255,0.1); border-left:3px solid var(--accent); padding-left:9px; }
.av {
  width:38px; height:38px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px;
}
.ci-info { flex:1; min-width:0; }
.ci-n { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ci-s { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.bdg { padding:3px 8px; border-radius:12px; font-size:11px; font-weight:600; flex-shrink:0; white-space:nowrap; }
.bp{background:rgba(245,158,11,.15);color:var(--amber)}
.bv{background:rgba(34,197,94,.15);color:var(--green)}
.bi{background:rgba(239,68,68,.15);color:var(--red)}

/* ── Detail panel ── */
.panel { flex:1; overflow-y:auto; padding:14px; min-width:0; background:var(--bg); }

/* ── Cards ── */
.card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:14px; margin-bottom:12px; }
.card-ttl { font-size:14px; font-weight:700; margin-bottom:10px; }
.fgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; margin-top:12px; }
.fb { background:var(--bg3); border-radius:var(--rs); padding:9px 11px; }
.fl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
.fv { font-size:13px; font-weight:500; }

/* ── Phone row ── */
.ph-row {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:var(--bg3); border-radius:var(--rs); padding:12px 13px;
}
.ph-num { font-size:20px; font-weight:700; letter-spacing:1.5px; font-variant-numeric:tabular-nums; }

/* ── Decision ── */
.dec-row { display:flex; gap:10px; margin-top:10px; }
.dec-btn {
  flex:1; padding:13px 8px; border-radius:var(--r); font-size:14px; font-weight:700;
  cursor:pointer; border:2px solid transparent; transition:all .15s;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.dv{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--green)}
.dv:hover,.dv:active{background:rgba(34,197,94,.22);border-color:var(--green)}
.di{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red)}
.di:hover,.di:active{background:rgba(239,68,68,.22);border-color:var(--red)}

/* ── Notes ── */
.nta {
  width:100%; padding:10px 11px; background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--rs); color:var(--text); font-size:14px; resize:vertical;
  min-height:80px; font-family:inherit; outline:none; transition:border-color .2s;
}
.nta:focus { border-color:var(--accent); }

/* ── Buttons ── */
.btn {
  padding:8px 15px; border-radius:var(--rs); font-size:13px; font-weight:600;
  cursor:pointer; border:none; transition:all .15s;
  display:inline-flex; align-items:center; justify-content:center; gap:4px;
}
.btn-p { background:var(--accent); color:#fff; }
.btn-p:hover { filter:brightness(1.12); }
.btn-o { background:transparent; color:var(--text); border:1px solid var(--border2); }
.btn-o:hover,.btn-o:active { background:var(--bg3); }
.btn-s { padding:6px 11px; font-size:12px; }
.copy-btn {
  background:var(--bg2); border:1px solid var(--border2); border-radius:var(--rs);
  padding:7px 12px; color:var(--text); cursor:pointer; font-size:12px; font-weight:600;
  white-space:nowrap; flex-shrink:0; transition:all .15s;
}
.copy-btn:hover,.copy-btn:active { background:var(--accent); border-color:var(--accent); color:#fff; }
.nav-row { display:flex; gap:8px; margin-top:6px; }
.nav-row .btn { flex:1; }
.back-btn {
  display:none; background:none; border:none; color:var(--accent);
  font-size:14px; font-weight:600; cursor:pointer; padding:0; margin-bottom:12px; align-items:center; gap:5px;
}
@media(max-width:767px){ .back-btn { display:flex; } }

/* ── Empty ── */
.empty {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; gap:14px; text-align:center; padding:1.5rem;
}

/* ── Import zone ── */
.imp-zone {
  border:2px dashed var(--border2); border-radius:var(--r);
  padding:2rem 1.5rem; text-align:center; cursor:pointer; transition:all .2s; margin-bottom:14px;
}
.imp-zone:hover,.imp-zone.drag { border-color:var(--accent); background:rgba(79,127,255,.06); }

/* ── Modal ── */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.65);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:500; opacity:0; pointer-events:none; transition:opacity .2s;
}
@media(min-width:600px){ .overlay { align-items:center; } }
.overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--card); border:1px solid var(--border2);
  border-radius:var(--r) var(--r) 0 0;
  padding:18px; width:100%; max-height:92vh; overflow-y:auto;
  transform:translateY(30px); transition:transform .22s;
}
@media(min-width:600px){ .modal { border-radius:var(--r); width:460px; max-width:95vw; transform:translateY(16px); } }
.overlay.open .modal { transform:translateY(0); }
.m-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.m-ttl { font-size:16px; font-weight:700; }
.m-x { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:2px; }
.mg { margin-bottom:11px; }
.ml { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; display:block; }
.mi {
  width:100%; padding:10px 11px; background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--rs); color:var(--text); font-size:16px; outline:none; transition:border-color .2s; font-family:inherit;
}
.mi:focus { border-color:var(--accent); }
.m2 { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
@media(max-width:400px){ .m2 { grid-template-columns:1fr; } }
.m-ft { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; padding-top:12px; border-top:1px solid var(--border); }

/* ── Toast ── */
.toast {
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--card); border:1px solid var(--border2); border-radius:var(--r);
  padding:10px 16px; font-size:13px; font-weight:500; opacity:0;
  transition:all .28s; z-index:999; white-space:nowrap; max-width:calc(100vw - 28px); text-align:center;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.tok { border-left:3px solid var(--green); }
.ter { border-left:3px solid var(--red); }

/* ── Table ── */
.tw { background:var(--card); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; overflow-x:auto; }
.tbl { width:100%; border-collapse:collapse; font-size:13px; }
.tbl th { text-align:left; padding:8px 11px; background:var(--bg3); color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
.tbl td { padding:9px 11px; border-bottom:1px solid var(--border); }
.tbl tr:last-child td { border-bottom:none; }

::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
</style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <div class="logo">
    <div class="logo-ic">📞</div>
    <span class="logo-txt">CallManager Pro</span>
  </div>
  <div class="hdr-right">
    <!-- Desktop stats + buttons -->
    <div class="desk-only">
      <div class="stat-pill"><span class="dot d-blue"></span><span id="sd-total">0</span>&nbsp;contacts</div>
      <div class="stat-pill"><span class="dot d-amber"></span><span id="sd-pending">0</span>&nbsp;attente</div>
      <div class="stat-pill"><span class="dot d-green"></span><span id="sd-valid">0</span>&nbsp;validés</div>
      <div class="stat-pill"><span class="dot d-red"></span><span id="sd-invalid">0</span>&nbsp;rejetés</div>
      <button class="btn btn-o btn-s" onclick="showResults()">📊 Rapport</button>
      <button class="btn btn-o btn-s" onclick="exportBackup()">⬇ Sauvegarder</button>
      <label class="btn btn-o btn-s" style="cursor:pointer;margin:0">⬆ Restaurer<input type="file" accept=".json" style="display:none" onchange="importBackup(this.files[0])"></label>
      <span id="si-d" style="font-size:11px;color:var(--green);white-space:nowrap"></span>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
</header>

<!-- Mobile bar -->
<div class="mob-bar">
  <div class="mob-stats">
    <div class="ms"><span class="ms-n" id="sm-total" style="color:var(--accent)">0</span><span class="ms-l">Total</span></div>
    <div class="ms"><span class="ms-n" id="sm-pending" style="color:var(--amber)">0</span><span class="ms-l">Attente</span></div>
    <div class="ms"><span class="ms-n" id="sm-valid" style="color:var(--green)">0</span><span class="ms-l">Validés</span></div>
    <div class="ms"><span class="ms-n" id="sm-invalid" style="color:var(--red)">0</span><span class="ms-l">Rejetés</span></div>
    <span id="si-m" class="si"></span>
  </div>
  <div class="mob-acts">
    <button class="btn btn-o" onclick="showResults()">📊 Rapport</button>
    <button class="btn btn-o" onclick="exportBackup()">⬇ Sauvegarder</button>
    <label class="btn btn-o" style="cursor:pointer;margin:0;flex:1;text-align:center">⬆ Restaurer<input type="file" accept=".json" style="display:none" onchange="importBackup(this.files[0])"></label>
  </div>
</div>

<!-- Body -->
<div class="app-body">
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="sb-row">
        <span class="sb-ttl">Contacts</span>
        <div style="display:flex;gap:6px">
          <label class="btn btn-o btn-s" style="cursor:pointer;margin:0" title="Importer Excel">📂 Importer<input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(this.files[0])"></label>
          <button class="btn btn-p btn-s" onclick="openAddModal()">+ Ajouter</button>
        </div>
      </div>
      <input class="srch" id="searchBox" type="text" placeholder="Rechercher...">
      <div class="ftabs">
        <button class="ftab on" onclick="setFilter('all',this)">Tous</button>
        <button class="ftab" onclick="setFilter('pending',this)">Attente</button>
        <button class="ftab" onclick="setFilter('valid',this)">Validés</button>
        <button class="ftab" onclick="setFilter('invalid',this)">Rejetés</button>
      </div>
      <div id="progWrap" style="display:none">
        <div class="prog-w"><div class="prog-f" id="progF" style="width:0%"></div></div>
        <div class="prog-l" id="progL"></div>
      </div>
    </div>
    <div class="clist" id="clist"></div>
  </aside>

  <section class="panel" id="panel">
    <div class="empty" id="welcome">
      <div style="font-size:46px;opacity:.35">📊</div>
      <div style="font-size:18px;font-weight:700">Importer votre fichier Excel</div>
      <div style="font-size:13px;color:var(--muted);max-width:280px;line-height:1.6">Glissez-déposez votre fichier .xlsx, .xls ou .csv</div>
      <div class="imp-zone" onclick="document.getElementById('fi').click()"
           ondragover="handleDrag(event)" ondrop="handleDrop(event)" ondragleave="this.classList.remove('drag')">
        <div style="font-size:34px;margin-bottom:9px">📁</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:5px">Glissez votre fichier ici</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:13px">Formats : .xlsx, .xls, .csv</div>
        <button class="btn btn-p" onclick="event.stopPropagation();document.getElementById('fi').click()">Choisir un fichier</button>
        <input type="file" id="fi" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(this.files[0])">
      </div>
      <div style="font-size:13px;color:var(--muted)">Ou &nbsp;<button class="btn btn-o btn-s" onclick="loadDemo()">Charger démo</button></div>
    </div>
    <div id="contactView" style="display:none"></div>
    <div id="resultsView" style="display:none"></div>
  </section>
</div>

<div class="toast" id="toast"></div>

<!-- Add modal -->
<div class="overlay" id="addModal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <div class="m-hd">
      <div class="m-ttl">➕ Ajouter un contact</div>
      <button class="m-x" onclick="closeAddModal()">✕</button>
    </div>
    <div class="m2">
      <div class="mg"><label class="ml">Nom *</label><input class="mi" id="f-nom" type="text" placeholder="Benali"></div>
      <div class="mg"><label class="ml">Prénom</label><input class="mi" id="f-prenom" type="text" placeholder="Amine"></div>
    </div>
    <div class="m2">
      <div class="mg"><label class="ml">Téléphone</label><input class="mi" id="f-tel" type="tel" placeholder="0661234567"></div>
      <div class="mg"><label class="ml">Email</label><input class="mi" id="f-email" type="email" placeholder="email@..."></div>
    </div>
    <div class="m2">
      <div class="mg"><label class="ml">Ville</label><input class="mi" id="f-ville" type="text" placeholder="Casablanca"></div>
      <div class="mg"><label class="ml">Société</label><input class="mi" id="f-societe" type="text" placeholder="TechMaroc"></div>
    </div>
    <div class="mg"><label class="ml">Notes</label><textarea class="mi" id="f-notes" rows="2" placeholder="Remarques..."></textarea></div>
    <div class="m-ft">
      <button class="btn btn-o" onclick="closeAddModal()">Annuler</button>
      <button class="btn btn-p" onclick="submitAdd()">✔ Ajouter</button>
    </div>
  </div>
</div>

<script>
let contacts=[], cid=null, cfilter='all';
const COLORS=['#4f7fff','#7c5cfc','#22c55e','#f59e0b','#ef4444','#06b6d4','#ec4899','#a855f7'];

// Theme
let theme=localStorage.getItem('cm_theme')||'dark';
function applyTheme(t){
  theme=t; document.documentElement.setAttribute('data-theme',t);
  const ic=t==='dark'?'☀️':'🌙';
  const b=document.getElementById('themeBtn'); if(b) b.textContent=ic;
  localStorage.setItem('cm_theme',t);
}
function toggleTheme(){ applyTheme(theme==='dark'?'light':'dark'); }
applyTheme(theme);

// Helpers
function colorFor(n){ let h=0; for(let c of n) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function initials(n){ const p=(n||'?').split(' ').filter(Boolean); return p.length>=2?p[0][0]+p[1][0]:(p[0]||'?')[0].toUpperCase(); }

// File import
function handleDrag(e){ e.preventDefault(); document.querySelector('.imp-zone').classList.add('drag'); }
function handleDrop(e){ e.preventDefault(); document.querySelector('.imp-zone').classList.remove('drag'); handleFile(e.dataTransfer.files[0]); }
function handleFile(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary', cellText:false, cellDates:true});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:'', raw:true});
      if(!rows.length){toast('Fichier vide ou invalide','err');return;}
      loadContacts(rows);
    }catch(e){toast('Erreur de lecture','err');}
  };
  r.readAsBinaryString(file);
}
function cleanPhone(val) {
  if (!val && val !== 0) return '';
  // If number (Excel stores phone as numeric), convert properly
  if (typeof val === 'number') {
    // Convert to integer string without scientific notation
    return Math.round(val).toString();
  }
  const s = String(val).trim();
  // Handle scientific notation like 2.12608e+11
  if (/e\+/i.test(s)) {
    return Math.round(parseFloat(s)).toString();
  }
  return s;
}

function guess(keys,terms){ for(const t of terms) for(const k of keys) if(k.toLowerCase().includes(t)) return k; return null; }
function loadContacts(rows){
  const keys=Object.keys(rows[0]);
  const nk=guess(keys,['nom','name','prenom','contact','full'])||keys[0];
  const pk=guess(keys,['tel','phone','mobile','portable','gsm','num']);
  const ek=guess(keys,['email','mail','courriel']);
  const ck=guess(keys,['ville','city','localite','region']);
  contacts=rows.map((r,i)=>({
    id:i, name:String(r[nk]||`Contact ${i+1}`).trim(),
    phone:pk ? cleanPhone(r[pk]) : '',
    email:ek?String(r[ek]||'').trim():'',
    city:ck?String(r[ck]||'').trim():'',
    status:'pending',notes:'',fields:r,fieldKeys:keys,
    nameKey:nk,phoneKey:pk,emailKey:ek,cityKey:ck
  }));
  document.getElementById('welcome').style.display='none';
  renderList(); updateStats(); autoSave();
  toast(`✅ ${contacts.length} contacts importés`,'ok');
}

// Render list
function renderList(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  const el=document.getElementById('clist');
  const list=contacts.filter(c=>{
    const mf=cfilter==='all'||c.status===cfilter;
    const ms=!q||c.name.toLowerCase().includes(q)||c.phone.includes(q)||(c.city||'').toLowerCase().includes(q);
    return mf&&ms;
  });
  el.innerHTML=list.map(c=>`
    <div class="ci ${c.id===cid?'on':''}" onclick="selectContact(${c.id})">
      <div class="av" style="background:${colorFor(c.name)}22;color:${colorFor(c.name)}">${initials(c.name)}</div>
      <div class="ci-info"><div class="ci-n">${c.name}</div><div class="ci-s">${c.phone||c.email||c.city||'—'}</div></div>
      <span class="bdg b${c.status[0]}">${c.status==='pending'?'Attente':c.status==='valid'?'Validé':'Rejeté'}</span>
    </div>`
  ).join('')|| (contacts.length===0 ? `
    <div style="padding:24px;text-align:center">
      <div style="font-size:36px;margin-bottom:10px;opacity:.4">📂</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:8px">Aucun contact</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Importez votre fichier Excel pour commencer</div>
      <label class="btn btn-p" style="cursor:pointer;display:inline-flex">
        📂 Importer Excel
        <input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(this.files[0])">
      </label>
      <div style="margin-top:10px">
        <button class="btn btn-o btn-s" onclick="loadDemo()">Charger démo</button>
      </div>
    </div>` : '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Aucun résultat</div>');
}
document.getElementById('searchBox').addEventListener('input',renderList);
function setFilter(f,el){ cfilter=f; document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on')); el.classList.add('on'); renderList(); }

// Mobile panels
function showDetail(){
  if(window.innerWidth<768){
    document.getElementById('sidebar').classList.add('gone');
    document.getElementById('panel').classList.remove('gone');
  }
}
function showList(){
  if(window.innerWidth<768){
    document.getElementById('sidebar').classList.remove('gone');
    document.getElementById('panel').classList.add('gone');
  }
}
function initMobileState(){
  if(window.innerWidth<768){
    // On mobile start: show sidebar (list), hide detail panel
    document.getElementById('sidebar').classList.remove('gone');
    document.getElementById('panel').classList.add('gone');
  }
}

// Select contact
function selectContact(id){
  cid=id;
  const c=contacts.find(x=>x.id===id);
  document.getElementById('welcome').style.display='none';
  document.getElementById('resultsView').style.display='none';
  document.getElementById('contactView').style.display='block';
  showDetail();

  const excl=[c.nameKey,c.phoneKey,c.emailKey,c.cityKey].filter(Boolean);
  const extra=c.fieldKeys.filter(k=>!excl.includes(k));
  const col=colorFor(c.name);

  document.getElementById('contactView').innerHTML=`
    <button class="back-btn" onclick="showList()">← Retour</button>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:16px;font-weight:700">Fiche Contact</span>
      <span class="bdg b${c.status[0]}" style="font-size:12px;padding:5px 11px">${c.status==='pending'?'⏳ Attente':c.status==='valid'?'✅ Validé':'❌ Rejeté'}</span>
    </div>

    <div class="card">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div class="av" style="width:48px;height:48px;border-radius:50%;font-size:17px;font-weight:700;background:${col}22;color:${col};display:flex;align-items:center;justify-content:center;flex-shrink:0">${initials(c.name)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:18px;font-weight:700;margin-bottom:4px">${c.name}</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            ${c.phone?`<span style="font-size:12px;color:var(--muted)">📱 ${c.phone}</span>`:''}
            ${c.email?`<span style="font-size:12px;color:var(--muted)">✉️ ${c.email}</span>`:''}
            ${c.city?`<span style="font-size:12px;color:var(--muted)">📍 ${c.city}</span>`:''}
          </div>
        </div>
      </div>
      ${extra.length?`<div class="fgrid">${extra.map(k=>`<div class="fb"><div class="fl">${k}</div><div class="fv">${c.fields[k]||'—'}</div></div>`).join('')}</div>`:''}
    </div>

    ${c.phone?`
    <div class="card">
      <div class="card-ttl">📱 Téléphone</div>
      <div class="ph-row">
        <span class="ph-num">${String(c.phone).replace(/[^\d+]/g,'')}</span>
        <button class="copy-btn" onclick="copyPhone('${String(c.phone).replace(/[^\d+]/g,'')}')">📋 Copier</button>
      </div>
    </div>`:''}

    <div class="card">
      <div class="card-ttl">📝 Notes</div>
      <textarea class="nta" id="notesArea" placeholder="Résumé de l'appel, remarques..." onchange="saveNotes(${id})">${c.notes}</textarea>
    </div>

    <div class="card">
      <div class="card-ttl">⚖️ Décision finale</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px">Enregistrez votre décision :</p>
      <div class="dec-row">
        <button class="dec-btn dv" onclick="setDecision(${id},'valid')">✅ Validé</button>
        <button class="dec-btn di" onclick="setDecision(${id},'invalid')">❌ Rejeté</button>
      </div>
      ${c.status!=='pending'?`<div style="margin-top:10px;text-align:right"><button class="btn btn-o btn-s" onclick="setDecision(${id},'pending')">⏳ Remettre en attente</button></div>`:''}
    </div>

    <div class="nav-row">
      <button class="btn btn-o" onclick="navigate(-1)" ${id===0?'disabled':''}>← Précédent</button>
      <button class="btn btn-p" onclick="navigate(1)" ${id===contacts.length-1?'disabled':''}>Suivant →</button>
    </div>
  `;
  renderList();
}

function navigate(dir){ const i=contacts.findIndex(c=>c.id===cid); const n=contacts[i+dir]; if(n) selectContact(n.id); }
function saveNotes(id){ contacts.find(x=>x.id===id).notes=document.getElementById('notesArea').value; autoSave(); }
function setDecision(id,status){
  contacts.find(x=>x.id===id).status=status;
  updateStats(); renderList(); selectContact(id); autoSave();
  toast(status==='valid'?'✅ Contact validé !':status==='invalid'?'❌ Contact rejeté':'⏳ Remis en attente',status==='valid'?'ok':'err');
}
function copyPhone(phone) {
  // Nettoyer le numéro — garder uniquement chiffres et +
  const clean = String(phone).replace(/[^\d+]/g, '');
  
  // Méthode 1 : input temporaire (fonctionne mieux sur mobile)
  const input = document.createElement('input');
  input.setAttribute('type', 'text');
  input.setAttribute('value', clean);
  input.style.cssText = 'position:fixed;top:0;left:0;opacity:0;font-size:16px';
  document.body.appendChild(input);
  input.focus();
  input.select();
  input.setSelectionRange(0, 99999);
  
  let ok = false;
  try { ok = document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(input);
  
  if (ok) {
    toast('📋 Copié : ' + clean, 'ok');
    return;
  }
  
  // Méthode 2 : clipboard API moderne
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(clean)
      .then(() => toast('📋 Copié : ' + clean, 'ok'))
      .catch(() => toast('❌ Échec copie', 'err'));
  } else {
    toast('❌ Copie non supportée', 'err');
  }
}

// Stats
function updateStats(){
  const p=contacts.filter(c=>c.status==='pending').length;
  const v=contacts.filter(c=>c.status==='valid').length;
  const i=contacts.filter(c=>c.status==='invalid').length;
  const t=contacts.length;
  [['total',t],['pending',p],['valid',v],['invalid',i]].forEach(([k,val])=>{
    ['sd-','sm-'].forEach(pfx=>{ const el=document.getElementById(pfx+k); if(el) el.textContent=val; });
  });
  const done=v+i, pct=t?Math.round(done/t*100):0;
  const pw=document.getElementById('progWrap');
  if(t){ pw.style.display='block'; document.getElementById('progF').style.width=pct+'%'; document.getElementById('progL').textContent=`${done} / ${t} traités (${pct}%)`; }
  else pw.style.display='none';
}

// Results
function showResults(){
  cid=null;
  document.getElementById('welcome').style.display='none';
  document.getElementById('contactView').style.display='none';
  document.getElementById('resultsView').style.display='block';
  showDetail();
  const v=contacts.filter(c=>c.status==='valid');
  const i=contacts.filter(c=>c.status==='invalid');
  const p=contacts.filter(c=>c.status==='pending');
  document.getElementById('resultsView').innerHTML=`
    <button class="back-btn" onclick="showList()">← Retour</button>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <span style="font-size:16px;font-weight:700">📊 Rapport</span>
      <button class="btn btn-p btn-s" onclick="exportExcel()">⬇ Export Excel</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px">
      <div class="card" style="text-align:center;padding:12px"><div style="font-size:28px;font-weight:800;color:var(--green)">${v.length}</div><div style="color:var(--muted);font-size:12px">Validés</div></div>
      <div class="card" style="text-align:center;padding:12px"><div style="font-size:28px;font-weight:800;color:var(--red)">${i.length}</div><div style="color:var(--muted);font-size:12px">Rejetés</div></div>
      <div class="card" style="text-align:center;padding:12px"><div style="font-size:28px;font-weight:800;color:var(--amber)">${p.length}</div><div style="color:var(--muted);font-size:12px">Attente</div></div>
    </div>
    ${mkT('✅ Validés',v)}${mkT('❌ Rejetés',i)}${p.length?mkT('⏳ En attente',p):''}
  `;
}
function mkT(title,list){
  if(!list.length) return '';
  return `<div style="margin-bottom:16px"><h3 style="font-size:13px;font-weight:700;margin-bottom:8px">${title}</h3>
    <div class="tw"><table class="tbl">
      <thead><tr><th>Nom</th><th>Téléphone</th><th>Ville</th><th>Notes</th><th></th></tr></thead>
      <tbody>${list.map(c=>`<tr>
        <td><strong>${c.name}</strong></td><td style="white-space:nowrap">${c.phone||'—'}</td>
        <td>${c.city||'—'}</td><td style="color:var(--muted);font-size:12px;max-width:140px">${c.notes||'—'}</td>
        <td><button class="btn btn-o btn-s" onclick="selectContact(${c.id})">Voir</button></td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>`;
}

// Export Excel
function exportExcel(){
  const rows=contacts.map(c=>({Nom:c.name,Téléphone:c.phone,Email:c.email,Ville:c.city,Statut:c.status==='valid'?'Validé':c.status==='invalid'?'Rejeté':'En attente',Notes:c.notes}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows.filter(r=>r.Statut==='Validé')),'Validés');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows.filter(r=>r.Statut==='Rejeté')),'Rejetés');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'Tous');
  XLSX.writeFile(wb,`rapport_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('✅ Excel exporté','ok');
}

// Add modal
function openAddModal(){ ['f-nom','f-prenom','f-tel','f-email','f-ville','f-societe','f-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';}); document.getElementById('addModal').classList.add('open'); setTimeout(()=>document.getElementById('f-nom').focus(),100); }
function closeAddModal(){ document.getElementById('addModal').classList.remove('open'); }
function submitAdd(){
  const nom=document.getElementById('f-nom').value.trim();
  if(!nom){toast('Le nom est obligatoire','err');return;}
  const prenom=document.getElementById('f-prenom').value.trim();
  const name=prenom?`${nom} ${prenom}`:nom;
  const tel=document.getElementById('f-tel').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const ville=document.getElementById('f-ville').value.trim();
  const societe=document.getElementById('f-societe').value.trim();
  const notes=document.getElementById('f-notes').value.trim();
  const newId=contacts.length?Math.max(...contacts.map(c=>c.id))+1:0;
  const fields={Nom:nom};
  if(prenom)fields.Prénom=prenom; if(tel)fields.Téléphone=tel; if(email)fields.Email=email; if(ville)fields.Ville=ville; if(societe)fields.Société=societe;
  contacts.push({id:newId,name,phone:tel,email,city:ville,status:'pending',notes,fields,fieldKeys:Object.keys(fields),nameKey:'Nom',phoneKey:tel?'Téléphone':null,emailKey:email?'Email':null,cityKey:ville?'Ville':null});
  closeAddModal(); updateStats(); renderList(); autoSave(); toast(`✅ ${name} ajouté`,'ok'); selectContact(newId);
}

// Save/Restore
function autoSave(){ try{ localStorage.setItem('cm_contacts',JSON.stringify(contacts)); updateSI(); }catch(e){} }
function updateSI(){
  const t=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  const txt='💾 '+t;
  const m=document.getElementById('si-m'); if(m) m.textContent=txt;
  const d=document.getElementById('si-d'); if(d) d.textContent=txt;
}
function restoreFromStorage(){
  try{
    const saved=localStorage.getItem('cm_contacts');
    if(saved){ contacts=JSON.parse(saved); if(contacts.length){ document.getElementById('welcome').style.display='none'; renderList(); updateStats(); updateSI(); toast(`🔄 ${contacts.length} contacts restaurés`,'ok'); } }
  }catch(e){}
}
function exportBackup(){
  const blob=new Blob([JSON.stringify({contacts,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`callmanager_${new Date().toISOString().slice(0,10)}.json`; a.click();
  toast('✅ Sauvegarde exportée','ok');
}
function importBackup(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{ const data=JSON.parse(e.target.result); const restored=data.contacts||data; if(!Array.isArray(restored)||!restored.length){toast('Fichier invalide','err');return;} contacts=restored; document.getElementById('welcome').style.display='none'; renderList(); updateStats(); autoSave(); toast(`✅ ${contacts.length} contacts restaurés`,'ok'); }
    catch(e){toast('Erreur lecture fichier','err');}
  };
  r.readAsText(file);
}

function toast(msg,type='ok'){ const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast show t${type}`; setTimeout(()=>t.className='toast',3500); }

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeAddModal();return;}
  if(document.getElementById('addModal').classList.contains('open'))return;
  if(!contacts.length)return;
  if(e.key==='ArrowRight'||e.key==='n')navigate(1);
  if(e.key==='ArrowLeft'||e.key==='p')navigate(-1);
  if(e.key==='v'&&cid!==null)setDecision(cid,'valid');
  if(e.key==='x'&&cid!==null)setDecision(cid,'invalid');
});

document.addEventListener('DOMContentLoaded',()=>{ restoreFromStorage(); initMobileState(); });
</script>
